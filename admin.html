<!DOCTYPE html>
<meta charset="UTF-8">
<title>渔好水产 - 管理后台</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
*{box-sizing:border-box;font-family:Microsoft YaHei,sans-serif;}
body{background:#f1f5f9;margin:0;padding:0;}

/* 登录 */
.login{position:fixed;top:0;left:0;width:100%;height:100%;background:#fff;display:flex;align-items:center;justify-content:center;z-index:999;}
.login-box{width:420px;padding:40px;background:#fff;border-radius:16px;box-shadow:0 8px 30px rgba(0,0,0,0.08);}
.login-box h2{text-align:center;margin-bottom:30px;color:#1e40af;}
input,select,textarea,button{width:100%;padding:14px;margin-bottom:16px;border:1px solid #ddd;border-radius:10px;font-size:15px;}
button{background:#2563eb;color:#fff;border:none;cursor:pointer;}
.sec-btn{background:#64748b;}
.hide-input{display:none;opacity:0;height:0;width:0;padding:0;margin:0;border:0;}

/* 顶部导航 */
.navbar{background:#fff;padding:0 20px;box-shadow:0 2px 6px rgba(0,0,0,0.05);display:flex;gap:2px;}
.nav-item{padding:16px 24px;cursor:pointer;font-size:15px;transition:.2s;}
.nav-item.active{background:#2563eb;color:#fff;}

/* 容器 */
.container{max-width:1200px;margin:0 auto;padding:20px;display:none;}
.page{display:none;}
.page.active{display:block;}

.card{background:#fff;border-radius:12px;padding:24px;margin-bottom:20px;box-shadow:0 2px 8px rgba(0,0,0,0.04);}
.card h3{margin-top:0;color:#2563eb;font-size:18px;}
.table{width:100%;border-collapse:collapse;margin-top:10px;}
.table th,.table td{padding:12px;text-align:left;border-bottom:1px solid #eee;}
.table th{background:#f8fafc;}
.del{background:#ef4444;padding:6px 10px;border-radius:6px;color:#fff;font-size:13px;border:none;margin-left:4px;}
.edit{background:#2563eb;padding:6px 10px;border-radius:6px;color:#fff;font-size:13px;border:none;}
.upload{padding:10px;background:#f0f7ff;border:1px dashed #2563eb;border-radius:8px;margin:10px 0;cursor:pointer;text-align:center;}
.preview{margin:10px 0;text-align:center;}
.preview img{max-width:160px;max-height:160px;border-radius:8px;object-fit:cover;}
.flex-row{display:flex;gap:10px;align-items:center;}
.flex-row input{margin:0;flex:1;}
.flex-row button{width:auto;margin:0;}
.edit-form{display:none;border:1px dashed #2563eb;padding:18px;border-radius:10px;margin:20px 0;}
</style>

<div class="login" id="login">
    <div class="login-box">
        <h2>管理员登录</h2>
        <!-- 隐藏干扰密码框，阻止浏览器自动填充 -->
        <input class="hide-input" type="password" autocomplete="new-password">
        <!-- 移除value默认填充，关闭自动填充 -->
        <input id="user" placeholder="账号" autocomplete="off">
        <input id="pwd" placeholder="密码" type="password" autocomplete="new-password">
        <button onclick="login()">登录</button>
    </div>
</div>

<div class="navbar" id="navbar" style="display:none;">
    <div class="nav-item active" onclick="switchPage('cate')">产品分类</div>
    <div class="nav-item" onclick="switchPage('product')">产品管理</div>
    <div class="nav-item" onclick="switchPage('news')">新闻管理</div>
</div>

<div class="container" id="container">

    <!-- 产品分类 -->
    <div class="page active" id="page-cate">
        <div class="card">
            <h3>产品分类管理</h3>
            <div class="flex-row">
                <input id="cateName" placeholder="分类名称">
                <button onclick="addCategory()">添加</button>
            </div>
            <div class="edit-form" id="cateEditForm">
                <h4>修改分类</h4>
                <input type="hidden" id="editCateId">
                <input id="editCateName">
                <button onclick="updateCategory()">保存</button>
                <button class="sec-btn" onclick="cancelEditCategory()">取消</button>
            </div>
            <table class="table">
                <tr><th>分类名称</th><th>操作</th></tr>
                <tbody id="cateList"></tbody>
            </table>
        </div>
    </div>

    <!-- 产品 -->
    <div class="page" id="page-product">
        <div class="card">
            <h3>添加产品</h3>
            <select id="p_cate"><option value="">请选择分类</option></select>
            <input id="p_name" placeholder="产品名称">
            <div class="upload" onclick="document.getElementById('p_file').click()">选择图片</div>
            <input type="file" id="p_file" style="display:none" accept="image/*">
            <div class="preview" id="p_preview"></div>
            <input id="p_desc" placeholder="简短介绍">
            <textarea id="p_content" rows="4" placeholder="详细说明"></textarea>
            <button onclick="addProduct()">添加产品</button>
        </div>
        <div class="edit-form" id="productEditForm">
            <h4>修改产品</h4>
            <input type="hidden" id="editProductId">
            <select id="editProductCate"></select>
            <input id="editProductName">
            <div class="preview" id="editProductPreview"></div>
            <div class="upload" onclick="document.getElementById('editProductFile').click()">更换图片</div>
            <input type="file" id="editProductFile" style="display:none" accept="image/*">
            <input id="editProductDesc">
            <textarea id="editProductContent" rows="4"></textarea>
            <button onclick="updateProduct()">保存</button>
            <button class="sec-btn" onclick="cancelEditProduct()">取消</button>
        </div>
        <div class="card">
            <h3>产品列表</h3>
            <table class="table">
                <tr><th>产品名称</th><th>分类</th><th>简介</th><th>操作</th></tr>
                <tbody id="p_list"></tbody>
            </table>
        </div>
    </div>

    <!-- 新闻 -->
    <div class="page" id="page-news">
        <div class="card">
            <h3>添加新闻</h3>
            <input id="n_title" placeholder="标题">
            <div class="upload" onclick="document.getElementById('n_file').click()">选择图片</div>
            <input type="file" id="n_file" style="display:none" accept="image/*">
            <div class="preview" id="n_preview"></div>
            <input id="n_date" placeholder="日期 2026-07-01">
            <input id="n_desc" placeholder="简介">
            <textarea id="n_content" rows="5" placeholder="详细内容"></textarea>
            <button onclick="addNews()">添加新闻</button>
        </div>
        <div class="edit-form" id="newsEditForm">
            <h4>修改新闻</h4>
            <input type="hidden" id="editNewsId">
            <div class="preview" id="editNewsPreview"></div>
            <div class="upload" onclick="document.getElementById('editNewsFile').click()">更换图片</div>
            <input type="file" id="editNewsFile" style="display:none" accept="image/*">
            <input id="editNewsTitle">
            <input id="editNewsDate">
            <input id="editNewsDesc">
            <textarea id="editNewsContent" rows="5"></textarea>
            <button onclick="updateNews()">保存</button>
            <button class="sec-btn" onclick="cancelEditNews()">取消</button>
        </div>
        <div class="card">
            <h3>新闻列表</h3>
            <table class="table">
                <tr><th>新闻标题</th><th>日期</th><th>操作</th></tr>
                <tbody id="n_list"></tbody>
            </table>
        </div>
    </div>

</div>

<script>
let pImg, nImg, editPImg, editNImg;

function login() {
    const u = document.getElementById('user').value;
    const pw = document.getElementById('pwd').value;
    if (u === 'admin' && pw === 'yuhao123') {
        document.getElementById('login').style.display = 'none';
        document.getElementById('navbar').style.display = 'flex';
        document.getElementById('container').style.display = 'block';
        refreshAll();
    } else {
        alert('账号或密码错误');
    }
}

function switchPage(page) {
    document.querySelectorAll('.page').forEach(el => el.classList.remove('active'));
    document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
    document.getElementById('page-' + page).classList.add('active');
    const navArr = [...document.querySelectorAll('.nav-item')];
    let targetIdx = 0;
    if(page === 'cate') targetIdx = 0;
    if(page === 'product') targetIdx = 1;
    if(page === 'news') targetIdx = 2;
    navArr[targetIdx].classList.add('active');
}

function toBase64(file, cb, previewId) {
    const r = new FileReader();
    r.onload = e => {
        cb(e.target.result);
        if (previewId) document.getElementById(previewId).innerHTML = `<img src="${e.target.result}">`;
    };
    r.readAsDataURL(file);
}

function get(k) { return JSON.parse(localStorage.getItem(k) || '[]') }
function set(k, d) { localStorage.setItem(k, JSON.stringify(d)) }

// 分类
function addCategory() {
    const name = document.getElementById('cateName').value.trim();
    if (!name) return alert('请输入名称');
    const list = get('categories');
    if (list.some(c => c.name === name)) return alert('已存在');
    list.push({ id: Date.now(), name });
    set('categories', list);
    document.getElementById('cateName').value = '';
    refreshAll();
}
function editCategory(id) {
    const c = get('categories').find(x => x.id == id);
    document.getElementById('editCateId').value = c.id;
    document.getElementById('editCateName').value = c.name;
    document.getElementById('cateEditForm').style.display = 'block';
}
function updateCategory() {
    const id = document.getElementById('editCateId').value;
    const newName = document.getElementById('editCateName').value.trim();
    if (!newName) return;
    const list = get('categories');
    const old = list.find(c => c.id == id);
    list.find(c => c.id == id).name = newName;
    set('categories', list);
    const pros = get('products').map(p => {
        if (p.category === old.name) p.category = newName;
        return p;
    });
    set('products', pros);
    cancelEditCategory();
    refreshAll();
}
function cancelEditCategory() { document.getElementById('cateEditForm').style.display = 'none'; }
function delCate(id) {
    if (!confirm('确定删除？')) return;
    set('categories', get('categories').filter(c => c.id != id));
    refreshAll();
}

// 产品
function addProduct() {
    const cate = document.getElementById('p_cate').value;
    const name = document.getElementById('p_name').value.trim();
    const desc = document.getElementById('p_desc').value.trim();
    const content = document.getElementById('p_content').value.trim();
    if (!name || !pImg) return alert('请填写名称并上传图片');
    const list = get('products');
    list.push({ id: Date.now(), name, category: cate, img: pImg, desc, content });
    set('products', list);
    document.getElementById('p_name').value = '';
    document.getElementById('p_desc').value = '';
    document.getElementById('p_content').value = '';
    document.getElementById('p_preview').innerHTML = '';
    pImg = null;
    refreshAll();
}
function editProduct(id) {
    const p = get('products').find(x => x.id == id);
    document.getElementById('editProductId').value = p.id;
    document.getElementById('editProductName').value = p.name;
    document.getElementById('editProductDesc').value = p.desc;
    document.getElementById('editProductContent').value = p.content || '';
    document.getElementById('editProductPreview').innerHTML = `<img src="${p.img}">`;
    editPImg = p.img;
    const opts = get('categories').map(c => `<option value="${c.name}" ${c.name==p.category?'selected':''}>${c.name}</option>`).join('');
    document.getElementById('editProductCate').innerHTML = `<option value="">请选择分类</option>` + opts;
    document.getElementById('productEditForm').style.display = 'block';
}
function updateProduct() {
    const id = document.getElementById('editProductId').value;
    const name = document.getElementById('editProductName').value.trim();
    const cate = document.getElementById('editProductCate').value;
    const desc = document.getElementById('editProductDesc').value.trim();
    const content = document.getElementById('editProductContent').value.trim();
    const list = get('products');
    const i = list.findIndex(x => x.id == id);
    list[i] = { ...list[i], name, category: cate, img: editPImg, desc, content };
    set('products', list);
    cancelEditProduct();
    refreshAll();
}
function cancelEditProduct() { document.getElementById('productEditForm').style.display = 'none'; }
function delProduct(id) {
    if (!confirm('确定删除？')) return;
    set('products', get('products').filter(x => x.id != id));
    refreshAll();
}

// 新闻
function addNews() {
    const title = document.getElementById('n_title').value.trim();
    const date = document.getElementById('n_date').value.trim();
    const desc = document.getElementById('n_desc').value.trim();
    const content = document.getElementById('n_content').value.trim();
    if (!title || !nImg) return alert('请填写标题并上传图片');
    const list = get('news');
    list.push({ id: Date.now(), title, img: nImg, date, desc, content });
    set('news', list);
    document.getElementById('n_title').value = '';
    document.getElementById('n_date').value = '';
    document.getElementById('n_desc').value = '';
    document.getElementById('n_content').value = '';
    document.getElementById('n_preview').innerHTML = '';
    nImg = null;
    refreshAll();
}
function editNews(id) {
    const n = get('news').find(x => x.id == id);
    document.getElementById('editNewsId').value = n.id;
    document.getElementById('editNewsTitle').value = n.title;
    document.getElementById('editNewsDate').value = n.date;
    document.getElementById('editNewsDesc').value = n.desc;
    document.getElementById('editNewsContent').value = n.content || '';
    document.getElementById('editNewsPreview').innerHTML = `<img src="${n.img}">`;
    editNImg = n.img;
    document.getElementById('newsEditForm').style.display = 'block';
}
function updateNews() {
    const id = document.getElementById('editNewsId').value;
    const title = document.getElementById('editNewsTitle').value.trim();
    const date = document.getElementById('editNewsDate').value.trim();
    const desc = document.getElementById('editNewsDesc').value.trim();
    const content = document.getElementById('editNewsContent').value.trim();
    const list = get('news');
    const i = list.findIndex(x => x.id == id);
    list[i] = { ...list[i], title, date, desc, content, img: editNImg };
    set('news', list);
    cancelEditNews();
    refreshAll();
}
function cancelEditNews() { document.getElementById('newsEditForm').style.display = 'none'; }
function delNews(id) {
    if (!confirm('确定删除？')) return;
    set('news', get('news').filter(x => x.id != id));
    refreshAll();
}

document.getElementById('p_file').onchange = e => toBase64(e.target.files[0], d => pImg = d, 'p_preview');
document.getElementById('n_file').onchange = e => toBase64(e.target.files[0], d => nImg = d, 'n_preview');
document.getElementById('editProductFile').onchange = e => toBase64(e.target.files[0], d => editPImg = d, 'editProductPreview');
document.getElementById('editNewsFile').onchange = e => toBase64(e.target.files[0], d => editNImg = d, 'editNewsPreview');

function refreshAll() {
    const cates = get('categories');
    const pros = get('products');
    const news = get('news');

    document.getElementById('cateList').innerHTML = cates.map(c => `
    <tr>
        <td>${c.name}</td>
        <td>
            <button class="edit" onclick="editCategory(${c.id})">修改</button>
            <button class="del" onclick="delCate(${c.id})">删除</button>
        </td>
    </tr>`).join('');

    const cateOpts = cates.map(c => `<option value="${c.name}">${c.name}</option>`).join('');
    document.getElementById('p_cate').innerHTML = `<option value="">请选择分类</option>` + cateOpts;

    document.getElementById('p_list').innerHTML = pros.map(p => `
    <tr>
        <td>${p.name}</td>
        <td>${p.category || '未分类'}</td>
        <td>${p.desc}</td>
        <td>
            <button class="edit" onclick="editProduct(${p.id})">修改</button>
            <button class="del" onclick="delProduct(${p.id})">删除</button>
        </td>
    </tr>`).join('');

    document.getElementById('n_list').innerHTML = news.map(n => `
    <tr>
        <td>${n.title}</td>
        <td>${n.date}</td>
        <td>
            <button class="edit" onclick="editNews(${n.id})">修改</button>
            <button class="del" onclick="delNews(${n.id})">删除</button>
        </td>
    </tr>`).join('');
}
</script>
</body>
</html>
