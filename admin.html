<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>后台管理</title>
<link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Microsoft YaHei,sans-serif;}
body{background:#f4f7fa;color:#333;}
.login-mask{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:9999;}
.login-box{background:#fff;width:400px;padding:40px;border-radius:14px;box-shadow:0 5px 25px rgba(0,0,0,.15);}
.login-box h3{text-align:center;margin-bottom:25px;color:#0969a8;}
.login-box input{width:100%;height:46px;padding:0 15px;border:1px solid #ddd;border-radius:6px;margin-bottom:15px;font-size:15px;}
.login-btn{width:100%;height:46px;background:#0969a8;color:#fff;border:none;border-radius:6px;font-size:16px;cursor:pointer;}
.container{max-width:1200px;margin:0 auto;padding:20px;display:none;}
.admin-title{font-size:24px;margin-bottom:20px;color:#0969a8;}
.tabs{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap;}
.tab{padding:10px 20px;background:#fff;border:1px solid #ddd;border-radius:6px;cursor:pointer;}
.tab.active{background:#0969a8;color:#fff;border-color:#0969a8;}
.page{display:none;}
.page.active{display:block;}
.card{background:#fff;border-radius:10px;padding:20px;box-shadow:0 2px 10px rgba(0,0,0,.05);margin-bottom:20px;}
.card-title{font-size:18px;margin-bottom:15px;color:#333;}
.form-item{margin-bottom:15px;}
.form-item label{display:block;margin-bottom:6px;font-weight:500;}
.form-item input,.form-item select,.form-item textarea{width:100%;padding:10px 12px;border:1px solid #ddd;border-radius:6px;font-size:14px;}
.form-item textarea{height:120px;resize:none;}
.btn{padding:10px 20px;background:#0969a8;color:#fff;border:none;border-radius:6px;cursor:pointer;margin-right:6px;margin-bottom:6px;}
.btn-danger{background:#d93030;}
.table{width:100%;border-collapse:collapse;background:#fff;margin-top:10px;}
.table th,.table td{padding:12px;text-align:left;border:1px solid #eee;}
.table th{background:#f8f9fa;}
.btns{display:flex;gap:6px;flex-wrap:wrap;}
.img-preview{max-height:120px;margin-top:8px;border-radius:6px;display:none;}
.export-area{margin-top:20px;}
#result{width:100%;height:240px;padding:10px;border:1px solid #ddd;border-radius:6px;font-family:monospace;}
</style>
</head>
<body>
<div class="login-mask" id="loginMask">
  <div class="login-box">
    <h3>管理员登录</h3>
    <input type="text" id="user" value="admin">
    <input type="password" id="pwd" value="yuhao123">
    <button class="login-btn" onclick="login()">登录</button>
  </div>
</div>

<div class="container" id="main">
  <div class="admin-title">后台管理</div>
  <div class="card export-area">
    <div class="card-title">一键导出 → 复制替换 index.html 中 SITE_DATA</div>
    <button class="btn" onclick="exportData()">导出数据</button>
    <textarea id="result"></textarea>
  </div>
  <div class="tabs">
    <div class="tab active" onclick="go('cate')">分类</div>
    <div class="tab" onclick="go('product')">产品</div>
    <div class="tab" onclick="go('news')">新闻</div>
  </div>

  <div id="page-cate" class="page active">
    <div class="card">
      <div class="form-item"><label>标识</label><input id="ck"></div>
      <div class="form-item"><label>名称</label><input id="cn"></div>
      <button class="btn" onclick="saveCate()">保存</button>
    </div>
    <div class="card"><table class="table" id="clist"></table></div>
  </div>

  <div id="page-product" class="page">
    <div class="card">
      <input type="hidden" id="pid">
      <div class="form-item"><label>产品名</label><input id="pname"></div>
      <div class="form-item"><label>分类</label><select id="pcate"></select></div>
      <div class="form-item"><label>图片</label><input type="file" onchange="upPimg()" accept="image/*"><img id="pimg" class="img-preview"></div>
      <div class="form-item"><label>简介</label><input id="pdesc"></div>
      <div class="form-item"><label>详情</label><textarea id="pcontent"></textarea></div>
      <button class="btn" onclick="saveProduct()">保存</button>
    </div>
    <div class="card"><table class="table" id="plist"></table></div>
  </div>

  <div id="page-news" class="page">
    <div class="card">
      <input type="hidden" id="nid">
      <div class="form-item"><label>标题</label><input id="ntitle"></div>
      <div class="form-item"><label>图片</label><input type="file" onchange="upNimg()" accept="image/*"><img id="nimg" class="img-preview"></div>
      <div class="form-item"><label>日期</label><input id="ndate"></div>
      <div class="form-item"><label>简介</label><input id="ndesc"></div>
      <div class="form-item"><label>详情</label><textarea id="ncontent"></textarea></div>
      <button class="btn" onclick="saveNews()">保存</button>
    </div>
    <div class="card"><table class="table" id="nlist"></table></div>
  </div>
</div>

<script>
const USER="admin",PWD="yuhao123";
function login(){let u=document.getElementById("user").value,p=document.getElementById("pwd").value;if(u==USER&&p==PWD){document.getElementById("loginMask").style.display="none";document.getElementById("main").style.display="block";loadAll();}else alert("账号密码错误")}
function go(p){document.querySelectorAll(".page").forEach(e=>e.classList.remove("active"));document.querySelectorAll(".tab").forEach(e=>e.classList.remove("active"));document.getElementById("page-"+p).classList.add("active");event.target.classList.add("active");loadAll()}
function g(k){return JSON.parse(localStorage.getItem(k)||"[]")}
function s(k,d){localStorage.setItem(k,JSON.stringify(d))}

function exportData(){let d={cate:g("cate"),product:g("product"),news:g("news")};document.getElementById("result").value=JSON.stringify(d,null,2);alert("复制后替换 index.html 里的 SITE_DATA 即可")}

function upPimg(){let f=event.target.files[0];if(!f)return;let r=new FileReader();r.onload=e=>{localStorage.setItem("tmpPimg",e.target.result);document.getElementById("pimg").src=e.target.result;document.getElementById("pimg").style.display="block"};r.readAsDataURL(f)}
function upNimg(){let f=event.target.files[0];if(!f)return;let r=new FileReader();r.onload=e=>{localStorage.setItem("tmpNimg",e.target.result);document.getElementById("nimg").src=e.target.result;document.getElementById("nimg").style.display="block"};r.readAsDataURL(f)}

function saveCate(){let k=document.getElementById("ck").value,n=document.getElementById("cn").value;if(!k||!n)return;let l=g("cate");l.push({key:k,name:n});s("cate",l);document.getElementById("ck").value="";document.getElementById("cn").value="";loadCate()}
function loadCate(){let l=g("cate");let sel=document.getElementById("pcate");sel.innerHTML="";l.forEach(i=>{sel.innerHTML+=`<option value="${i.key}">${i.name}</option>`});let t=document.getElementById("clist");let h="";l.forEach((i,idx)=>{h+=`<tr><td>${i.key}</td><td>${i.name}</td><td><button class="btn btn-danger" onclick="delCate(${idx})">删</button></td></tr>`});t.innerHTML=h}
function delCate(idx){let l=g("cate");l.splice(idx,1);s("cate",l);loadCate()}

function saveProduct(){let id=document.getElementById("pid").value,name=document.getElementById("pname").value,cate=document.getElementById("pcate").value,img=localStorage.getItem("tmpPimg")||"",desc=document.getElementById("pdesc").value,content=document.getElementById("pcontent").value;if(!name||!cate)return;let l=g("product");if(id){let i=l.findIndex(x=>x.id==id);l[i]={id,name,cate,img,desc,content}}else{let newId=l.length?Math.max(...l.map(x=>x.id))+1:1;l.push({id:newId,name,cate,img,desc,content})}s("product",l);clearP();loadPro()}
function editP(id){let d=g("product").find(x=>x.id==id);document.getElementById("pid").value=d.id;document.getElementById("pname").value=d.name;document.getElementById("pcate").value=d.cate;localStorage.setItem("tmpPimg",d.img);document.getElementById("pimg").src=d.img;document.getElementById("pimg").style.display="block";document.getElementById("pdesc").value=d.desc;document.getElementById("pcontent").value=d.content}
function delP(id){let l=g("product");s("product",l.filter(x=>x.id!=id));loadPro()}
function clearP(){document.getElementById("pid").value="";document.getElementById("pname").value="";localStorage.removeItem("tmpPimg");document.getElementById("pimg").style.display="none";document.getElementById("pdesc").value="";document.getElementById("pcontent").value=""}
function loadPro(){let l=g("product");let t=document.getElementById("plist");let h="";l.forEach(d=>{h+=`<tr><td>${d.name}</td><td>${d.desc}</td><td><button class="btn" onclick="editP(${d.id})">编</button><button class="btn btn-danger" onclick="delP(${d.id})">删</button></td></tr>`});t.innerHTML=h}

function saveNews(){let id=document.getElementById("nid").value,title=document.getElementById("ntitle").value,img=localStorage.getItem("tmpNimg")||"",date=document.getElementById("ndate").value,desc=document.getElementById("ndesc").value,content=document.getElementById("ncontent").value;if(!title)return;let l=g("news");if(id){let i=l.findIndex(x=>x.id==id);l[i]={id,title,img,date,desc,content}}else{let newId=l.length?Math.max(...l.map(x=>x.id))+1:1;l.push({id:newId,title,img,date,desc,content})}s("news",l);clearN();loadNews()}
function editN(id){let d=g("news").find(x=>x.id==id);document.getElementById("nid").value=d.id;document.getElementById("ntitle").value=d.title;localStorage.setItem("tmpNimg",d.img);document.getElementById("nimg").src=d.img;document.getElementById("nimg").style.display="block";document.getElementById("ndate").value=d.date;document.getElementById("ndesc").value=d.desc;document.getElementById("ncontent").value=d.content}
function delN(id){let l=g("news");s("news",l.filter(x=>x.id!=id));loadNews()}
function clearN(){document.getElementById("nid").value="";document.getElementById("ntitle").value="";localStorage.removeItem("tmpNimg");document.getElementById("nimg").style.display="none";document.getElementById("ndate").value="";document.getElementById("ndesc").value="";document.getElementById("ncontent").value=""}
function loadNews(){let l=g("news");let t=document.getElementById("nlist");let h="";l.forEach(d=>{h+=`<tr><td>${d.title}</td><td>${d.date}</td><td><button class="btn" onclick="editN(${d.id})">编</button><button class="btn btn-danger" onclick="delN(${d.id})">删</button></td></tr>`});t.innerHTML=h}

function loadAll(){loadCate();loadPro();loadNews()}
</script>
</body>
</html>
