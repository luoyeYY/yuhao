<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>新闻详情</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Microsoft YaHei;}
:root{--main:#0969a8;}
body{background:#f5f7fa;padding:20px;}
.container{max-width:900px;margin:0 auto;background:#fff;border-radius:12px;padding:40px;box-shadow:0 3px 15px rgba(0,0,0,0.08);}
.back{margin-bottom:20px;}
.back a{color:var(--main);text-decoration:none;}
.news-img{width:100%;max-height:400px;object-fit:cover;border-radius:12px;margin-bottom:20px;}
.news-title{font-size:26px;margin-bottom:10px;color:#222;}
.news-date{color:#999;font-size:14px;margin-bottom:20px;}
.news-content{line-height:1.9;color:#444;font-size:16px;white-space:pre-line;}
</style>
</head>
<body>
<div class="container">
<div class="back"><a href="index.html#news">← 返回新闻列表</a></div>
<div id="detail"></div>
</div>

<script>
function getNewsById(id){
    const list=JSON.parse(localStorage.getItem('news')||[])
    const item = list.find(i=>i.id == id)
    if(!item) return {title:"暂无新闻",date:"",img:"",content:"暂无内容"}
    return item
}

const id=new URLSearchParams(location.search).get('id');
const item=getNewsById(id);
document.getElementById('detail').innerHTML=`
    <img class="news-img" src="${item.img}">
    <h1 class="news-title">${item.title}</h1>
    <div class="news-date">发布日期：${item.date}</div>
    <div class="news-content">${item.content}</div>
`;
</script>
</body>
</html>
