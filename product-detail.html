<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>产品详情</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Microsoft YaHei;}
:root{--main:#0969a8;}
body{background:#f5f7fa;padding:20px;}
.container{max-width:900px;margin:0 auto;background:#fff;border-radius:12px;padding:40px;box-shadow:0 3px 15px rgba(0,0,0,0.08);}
.back{margin-bottom:20px;}
.back a{color:var(--main);text-decoration:none;font-size:16px;}
.detail{display:grid;grid-template-columns:240px 1fr;gap:30px;}
.detail img{width:100%;border-radius:12px;background:#e8f4fb;min-height:160px;}
.info h1{font-size:24px;margin-bottom:10px;color:#222;}
.tag{display:inline-block;background:#e8f4fb;color:var(--main);padding:5px 12px;border-radius:20px;font-size:14px;margin-bottom:15px;}
.desc{line-height:1.9;color:#444;font-size:16px;white-space:pre-line;}
@media(max-width:700px){.detail{grid-template-columns:1fr;}}
</style>
</head>
<body>
<div class="container">
<div class="back"><a href="product.html">← 返回产品列表</a></div>
<div class="detail" id="detail"></div>
</div>

<script>
const id = new URLSearchParams(location.search).get('id')
const d = JSON.parse(localStorage.getItem('SITE_DATA')||'{"cate":[],"product":[],"news":[]}')
const p = (d.product||[]).find(x=>x.id==id)||{name:'无',cate:'',img:'',content:'无'}
const c = (d.cate||[]).find(x=>x.key===p.cate)||{name:''}

document.getElementById('detail').innerHTML = `
  <img src="${p.img}" alt="${p.name}">
  <div class="info">
    <h1>${p.name}</h1>
    <div class="tag">${c.name}</div>
    <div class="desc">${p.content}</div>
  </div>
`
</script>
</body>
</html>
